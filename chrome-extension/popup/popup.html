<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>BugPilot AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span style="font-size:20px">🐛</span>
      <div>
        <h1>BugPilot AI</h1>
        <p>AI-powered debugger</p>
      </div>
    </div>
    <span class="badge-plan" id="planBadge">Free</span>
  </div>

  <!-- Auth section (hidden when logged in) -->
  <div class="auth-section" id="authSection">
    <h2>Sign in to debug</h2>
    <p>Use your BugPilot AI account</p>
    <div id="authError" class="alert-error" style="display:none"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@gmail.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Your password" />
    </div>
    <button class="btn btn-primary" id="loginBtn">Sign In</button>
  </div>

  <!-- Logged in section -->
  <div id="mainSection" style="display:none">

    <!-- User bar -->
    <div class="user-bar">
      <div class="user-bar-left">
        <div class="avatar" id="userAvatar">U</div>
        <span id="userName" style="font-size:12px;font-weight:600"></span>
      </div>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="analyze">Analyze</button>
      <button class="tab" data-tab="errors">Page Errors</button>
    </div>

    <!-- Analyze tab -->
    <div class="debug-section" id="tabAnalyze">
      <div class="section-label">Input</div>
      <textarea id="textInput" placeholder="Paste error message or code..."></textarea>

      <select id="langSelect">
        <option value="unknown">Auto detect language</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="other">Other</option>
      </select>

      <div class="actions">
        <button class="btn btn-primary" id="analyzeBtn" style="flex:1">
          🔍 Analyze
        </button>
        <button class="btn btn-outline btn-sm" id="clearBtn">Clear</button>
      </div>

      <div id="analyzeLoading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p style="margin-top:8px;font-size:12px">AI analyzing...</p>
      </div>

      <div id="result" class="result"></div>
    </div>

    <!-- Page Errors tab -->
    <div class="debug-section" id="tabErrors" style="display:none">
      <div class="actions" style="margin-bottom:10px">
        <button class="btn btn-outline btn-full" id="grabErrorsBtn">
           Grab Page Errors
        </button>
      </div>
      <div id="errorsList"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
