<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--vscode-font-family);
      font-size: 13px;
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, #333);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header h3 {
      font-size: 13px;
      font-weight: 700;
    }

    .header p {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 1px;
    }

    /* Body */
    .body {
      padding: 12px 14px;
      flex: 1;
      overflow-y: auto;
    }

    /* Labels */
    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.5;
      margin-bottom: 5px;
      margin-top: 12px;
    }

    .label:first-child {
      margin-top: 0;
    }

    /* Textarea */
    textarea {
      width: 100%;
      padding: 8px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, #464646);
      border-radius: 6px;
      font-family: var(--vscode-editor-font-family);
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #6366f1;
    }

    /* Select */
    select {
      width: 100%;
      padding: 6px 8px;
      margin-top: 6px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, #464646);
      border-radius: 6px;
      font-size: 11px;
      outline: none;
    }

    /* Mode row */
    .mode-row {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      border: 1px solid var(--vscode-input-border, #464646);
      background: var(--vscode-input-background);
      color: var(--vscode-foreground);
      opacity: 0.6;
      transition: all 0.15s;
    }

    .mode-btn:hover {
      opacity: 0.9;
    }

    .mode-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      opacity: 1;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-secondary {
      background: var(--vscode-input-background);
      color: var(--vscode-foreground);
      opacity: 0.7;
      border: 1px solid var(--vscode-input-border, #464646);
    }

    .btn-secondary:hover {
      opacity: 1;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .ring {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #333;
      border-top-color: #6366f1;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading p {
      font-size: 11px;
    }

    /* Result cards */
    .result-card {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border-left: 3px solid;
    }

    .card-root {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.07);
    }

    .card-explain {
      border-color: #fbbf24;
      background: rgba(251, 191, 36, 0.07);
    }

    .card-solution {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.07);
    }

    .card-code {
      border-color: #818cf8;
      background: rgba(129, 140, 248, 0.07);
    }

    .card-lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      opacity: 0.7;
    }

    .card-txt {
      font-size: 12px;
      line-height: 1.65;
    }

    pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 6px;
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #94a3b8;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      opacity: 0.7;
    }

    .tokens {
      font-size: 10px;
      opacity: 0.4;
      text-align: right;
      margin-top: 8px;
    }

    .err-msg {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 6px;
      font-size: 11px;
      color: #f87171;
    }

    .hint {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      font-size: 11px;
      color: #a5b4fc;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🐛</div>
    <div>
      <h3>BugPilot AI</h3>
      <p>AI-powered debugger</p>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="hint">
      💡 Select code in editor → right-click → <b>BugPilot AI: Analyze</b> for instant analysis
    </div>

    <div class="label" style="margin-top:14px">Code / Error</div>
    <textarea id="input" placeholder="Or paste error or code here directly..."></textarea>

    <div class="label">Language</div>
    <select id="lang">
      <option value="unknown">Auto detect</option>
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
      <option value="cpp">C++</option>
      <option value="go">Go</option>
      <option value="rust">Rust</option>
      <option value="other">Other</option>
    </select>

    <div class="label" style="margin-top:10px">Mode</div>
    <div class="mode-row">
      <div class="mode-btn active" data-mode="analyze">🔍 Analyze</div>
      <div class="mode-btn" data-mode="fix">🔧 Fix Bug</div>
      <div class="mode-btn" data-mode="optimize">⚡ Optimize</div>
    </div>

    <button class="btn btn-primary" id="analyzeBtn">Analyze with AI</button>
    <button class="btn btn-secondary" id="settingsBtn">⚙ Set API Token in Settings</button>

    <div id="loading" class="loading" style="display:none">
      <div class="ring"></div>
      <p>Gemini AI is analyzing...</p>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    let activeMode = "analyze";

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeMode = btn.dataset.mode;
      });
    });

    document.getElementById("analyzeBtn").addEventListener("click", () => {
      const text = document.getElementById("input").value.trim();
      const lang = document.getElementById("lang").value;
      if (!text) return;
      setLoading(true);
      document.getElementById("result").innerHTML = "";
      vscode.postMessage({ type: "ANALYZE", text, language: lang, mode: activeMode });
    });

    document.getElementById("settingsBtn").addEventListener("click", () => {
      vscode.postMessage({ type: "OPEN_SETTINGS" });
    });

    window.addEventListener("message", e => {
      const msg = e.data;
      setLoading(false);

      if (msg.type === "RESULT" || msg.type === "ANALYSIS_RESULT") {
        const d = msg.payload?.data || msg.payload;
        const a = d?.analysis;

        // If sent from editor command, populate textarea
        if (msg.selectedCode) document.getElementById("input").value = msg.selectedCode;

        if (!a) { showErr("No analysis returned. Try again."); return; }

        let html = "";
        if (a.rootCause) html += card("card-root", "🎯 Root Cause", a.rootCause);
        if (a.explanation) html += card("card-explain", "📖 Explanation", a.explanation);
        if (a.solution) html += card("card-solution", "✅ Solution", a.solution);
        if (a.codeSnippet) html += `
      <div class="result-card card-code">
        <div class="card-lbl">💻 Fixed Code</div>
        <pre><button class="copy-btn" onclick="copyCode()">Copy</button>${esc(a.codeSnippet)}</pre>
      </div>`;
        if (a.tags?.length) html += `
      <div class="tags">
        ${a.tags.map(t => `<span class="tag">#${t}</span>`).join("")}
      </div>`;
        if (d.tokensUsed) html += `<div class="tokens">⚡ ${d.tokensUsed} tokens</div>`;

        document.getElementById("result").innerHTML = html;
      }

      if (msg.type === "ERROR") showErr(msg.message);
    });

    function card(cls, lbl, txt) {
      return `<div class="result-card ${cls}"><div class="card-lbl">${lbl}</div><div class="card-txt">${esc(txt)}</div></div>`;
    }
    function showErr(msg) {
      document.getElementById("result").innerHTML = `<div class="err-msg">⚠ ${msg}</div>`;
    }
    function setLoading(show) {
      document.getElementById("loading").style.display = show ? "flex" : "none";
      document.getElementById("analyzeBtn").disabled = show;
      document.getElementById("analyzeBtn").textContent = show ? "Analyzing..." : "Analyze with AI";
    }
    function esc(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    window.copyCode = () => {
      const code = document.querySelector("pre")?.innerText
        ?.replace("Copy", "").replace("Copied!", "").trim();
      navigator.clipboard.writeText(code || "");
      document.querySelector(".copy-btn").textContent = "Copied!";
      setTimeout(() => document.querySelector(".copy-btn").textContent = "Copy", 2000);
    };
  </script>
</body>

</html>
